<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Calculadora</title>

<style>
html, body {
  margin:0;
  height:100%;
  background:#000;
  font-family:-apple-system, BlinkMacSystemFont, system-ui;
}

.calc{
  position:fixed;
  bottom: calc(64px + env(safe-area-inset-bottom));
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:390px;
  padding:0 16px;
  box-sizing:border-box;
}

.topbar{
  position:fixed;
  top: calc(10px + env(safe-area-inset-top));
  left:50%;
  transform:translateX(-50%);
  width:100%;
  max-width:390px;
  padding:0 16px;
  box-sizing:border-box;
  display:flex;
  justify-content:space-between;
  z-index:10;
}

.icon{
  width:44px;
  height:44px;
  border-radius:50%;
  background:#1c1c1e;
  display:flex;
  align-items:center;
  justify-content:center;
}

.icon svg{
  width:22px;
  height:22px;
  stroke:#fff;
  fill:none;
  stroke-width:2;
}

#display{
  color:#fff;
  font-size:82px;
  font-weight:300;
  text-align:right;
  margin:80px 0 20px;
  letter-spacing:-2px;
  word-wrap:break-word;
}

.grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:12px;
}

button{
  height:78px;
  border:none;
  border-radius:50%;
  font-size:30px;
  color:#fff;
  background:#2c2c2e;
  box-shadow:
    inset 0 -2px 0 rgba(0,0,0,0.4),
    inset 0 2px 0 rgba(255,255,255,0.05);
}

.light{
  background:#d4d4d2;
  color:#000;
}

.op{
  background:#ff9f0a;
  color:#fff;
}

.zero{
  grid-column:span 2;
  border-radius:40px;
  text-align:left;
  padding-left:28px;
}

.delete-icon{
  width:28px;
  height:28px;
}

.delete-icon path{
  stroke:#000;
  stroke-width:2.2;
  stroke-linecap:round;
  stroke-linejoin:round;
  fill:none;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="icon">
    <svg viewBox="0 0 24 24">
      <circle cx="12" cy="12" r="9"/>
      <path d="M12 7v5l3 2"/>
    </svg>
  </div>

  <div class="icon">
    <svg viewBox="0 0 24 24">
      <rect x="5" y="3" width="14" height="18" rx="3"/>
      <circle cx="9" cy="10" r="1" fill="#fff"/>
      <circle cx="15" cy="10" r="1" fill="#fff"/>
      <circle cx="9" cy="14" r="1" fill="#fff"/>
      <circle cx="15" cy="14" r="1" fill="#fff"/>
    </svg>
  </div>
</div>

<div class="calc">

  <div id="display">0</div>

  <div class="grid">

    <button class="light" onclick="backspace()">
      <svg class="delete-icon" viewBox="0 0 24 24">
        <path d="M3 12l6-6h9a2 2 0 012 2v8a2 2 0 01-2 2H9l-6-6z"/>
        <path d="M10 9l5 6M15 9l-5 6"/>
      </svg>
    </button>

    <button id="clearBtn" class="light" onclick="clearAction()">AC</button>
    <button class="light" onclick="percent()">%</button>
    <button class="op" onclick="setOp('/')">÷</button>

    <button onclick="num(7)">7</button>
    <button onclick="num(8)">8</button>
    <button onclick="num(9)">9</button>
    <button class="op" onclick="setOp('*')">×</button>

    <button onclick="num(4)">4</button>
    <button onclick="num(5)">5</button>
    <button onclick="num(6)">6</button>
    <button class="op" onclick="setOp('-')">−</button>

    <button onclick="num(1)">1</button>
    <button onclick="num(2)">2</button>
    <button onclick="num(3)">3</button>
    <button class="op" onclick="setOp('+')">+</button>

    <button class="zero" onclick="num(0)">0</button>
    <button onclick="dot()">.</button>
    <button class="op" onclick="equal()">=</button>

  </div>
</div>

<script>
let display = document.getElementById("display");
let current="0", prev=null, op=null, reset=false;

function update(){
  display.innerText=current;
  updateClearBtn();
}

function num(n){
  if(current==="0"||reset){ current=""+n; reset=false; }
  else current+=n;
  update();
}

function dot(){
  if(reset){ current="0."; reset=false; }
  else if(!current.includes(".")) current+=".";
  update();
}

function backspace(){
  current=current.slice(0,-1)||"0";
  update();
}

function clearAction(){
  if(current!=="0"){
    current="0";
  }else{
    prev=null; op=null;
  }
  update();
}

function updateClearBtn(){
  document.getElementById("clearBtn").innerText =
    (current!=="0"||prev!==null) ? "C" : "AC";
}

function percent(){
  current=(parseFloat(current)/100).toString();
  update();
}

function setOp(o){
  prev=parseFloat(current);
  op=o;
  reset=true;
}

/* 😈 bug */
function trap(real){
  let aplicar = Math.random() < 0.65;
  if(!aplicar) return real;

  let error = Math.random()*0.01 + 0.002;
  let fake = real * (1 - error);
  if(fake >= real) fake = real - 0.01;

  return fake;
}

/* ✅ DECIMALES ESTILO iOS */
function equal(){
  if(op===null||prev===null) return;

  let curr = parseFloat(current);
  let result = 0;

  if(op==="+") result = prev + curr;
  if(op==="-") result = prev - curr;
  if(op==="*") result = prev * curr;
  if(op==="/") result = prev / curr;

  result = trap(result);

  result = parseFloat(result.toFixed(10));

  let abs = Math.abs(result);
  let formatted;

  if(abs >= 10){
    formatted = result.toFixed(2);
  } else {
    formatted = result.toFixed(1);
  }

  formatted = parseFloat(formatted).toString();

  current = formatted;
  op = null;
  prev = null;
  reset = true;

  update();
}
</script>

</body>
</html>
